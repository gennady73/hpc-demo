apiVersion: apps/v1
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hpc-poc-cfs
  labels:
    app: hpc-matrix-app
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: hpc-matrix-app
  template:
    metadata:
      labels:
        app: hpc-matrix-app
    spec:
      nodeSelector:
        node-role.kubernetes.io/worker: ""
        hpc-common: "true"
      containers:
      - name: matrix-calculator
        image: docker.io/gennady73/hpc-poc:latest 
        imagePullPolicy: Always
        command: ["/bin/sh", "-c"]
        args: ["./hpc_app && sleep infinity"]
        env:
        - name: MALLOC_ARENA_MAX
          value: "2"
        resources:
          # Guaranteed QoS: Requests and Limits must be identical whole integers
          requests:
            cpu: "6"
            memory: "5Gi"
          limits:
            cpu: "6"
            memory: "5Gi"

