apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfigPool
metadata:
  name: hpc
spec:
  machineConfigSelector:
    matchExpressions:
      - {key: machineconfiguration.openshift.io/role, operator: In, values: [worker, hpc]}
  nodeSelector:
    matchLabels:
      node-role.kubernetes.io/hpc: ""

